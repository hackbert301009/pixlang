<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="text_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="12" fill="url(#bg)"/>

  <!-- Pixel grid decoration (top-left) -->
  <g opacity="0.15">
    <rect x="12" y="12" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="21" y="12" width="6" height="6" rx="1" fill="#2563eb"/>
    <rect x="12" y="21" width="6" height="6" rx="1" fill="#2563eb"/>
    <rect x="21" y="21" width="6" height="6" rx="1" fill="#7c3aed"/>
  </g>
  <g opacity="0.08">
    <rect x="30" y="12" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="12" y="30" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="30" y="30" width="6" height="6" rx="1" fill="#2563eb"/>
  </g>

  <!-- "px" monogram box -->
  <rect x="14" y="44" width="52" height="36" rx="6" fill="url(#accent)"/>
  <text x="40" y="69" font-family="'Courier New', monospace" font-size="22"
        font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0">px</text>

  <!-- PIXLANG wordmark -->
  <text x="82" y="72" font-family="'Courier New', monospace" font-size="36"
        font-weight="bold" fill="url(#text_grad)" letter-spacing="2">PIXLANG</text>

  <!-- Tagline -->
  <text x="82" y="92" font-family="'Courier New', monospace" font-size="11"
        fill="#475569" letter-spacing="1">computer vision · pipeline DSL</text>

  <!-- Accent bar -->
  <rect x="82" y="52" width="3" height="28" rx="1.5" fill="url(#accent)"/>

  <!-- Version tag -->
  <rect x="410" y="44" width="56" height="20" rx="4" fill="#1e293b"/>
  <text x="438" y="58" font-family="'Courier New', monospace" font-size="10"
        fill="#7c3aed" text-anchor="middle" letter-spacing="1">v0.4.0</text>

  <!-- Pixel grid decoration (bottom-right) -->
  <g opacity="0.12">
    <rect x="452" y="80" width="6" height="6" rx="1" fill="#2563eb"/>
    <rect x="461" y="80" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="452" y="89" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="461" y="89" width="6" height="6" rx="1" fill="#2563eb"/>
    <rect x="461" y="98" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="452" y="98" width="6" height="6" rx="1" fill="#2563eb"/>
  </g>
</svg>
