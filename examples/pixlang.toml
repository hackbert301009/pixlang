# pixlang.toml — Project configuration for PixLang v0.4
# Place this file in your project root (alongside your .pxl files).
# PixLang searches for it in the pipeline directory and parent dirs.

[pixlang]
version = "0.4"

[defaults]
# These are overridden by CLI flags (--verbose, --no-plugins)
verbose = false
plugins = true
lint    = true

[variables]
# Pre-injected into every pipeline run as $variable references
width    = 640
height   = 480
blur_k   = 5
mode     = "production"

[lint]
# Silence specific lint rules by code
# PX006 = duplicate consecutive commands (common in morphology chains)
ignore = ["PX006"]

[batch]
output_dir = "output"
